name: Run MyWhoosh2Garmin

on:
  workflow_dispatch: {}
  schedule:
    - cron: "30 10-20 * * *"

jobs:
  run-myWhoosh2Garmin:
    name: Run MyWhoosh2Garmin
    runs-on: ubuntu-latest # Changed from ubuntu-slim, as ubuntu-slim isn't a standard GitHub-hosted runner
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install uv and Python
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.13"
          enable-cache: true

      - name: Install project (from pyproject.toml)
        shell: bash
        run: |
          uv sync --frozen

      - name: Run myWhoosh2Garmin.py
        shell: bash
        env:
          STRAVA_CLIENT_ID: ${{ secrets.STRAVA_CLIENT_ID }}
          STRAVA_CLIENT_SECRET: ${{ secrets.STRAVA_CLIENT_SECRET }}
          STRAVA_ACCESS_TOKEN: ${{ secrets.STRAVA_ACCESS_TOKEN }}
          STRAVA_EXPIRES_AT: ${{ secrets.STRAVA_EXPIRES_AT }}
          STRAVA_EXPIRES_IN: ${{ secrets.STRAVA_EXPIRES_IN }}
          STRAVA_REFRESH_TOKEN: ${{ secrets.STRAVA_REFRESH_TOKEN }}
          GARMIN_TOKENS: ${{ secrets.GARMIN_TOKENS }}
        run: |
          set -euxo pipefail # Added 'x' to print each command before it executes
          source .venv/bin/activate
          python -u -X faulthandler myWhoosh2Garmin.py # Added flags to force instant, detailed crash logs
